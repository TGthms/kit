<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none" role="img" aria-label="Kit">
  <defs>
    <linearGradient id="kit-bg" x1="16" y1="4" x2="114" y2="124" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5AC8FA"/>
      <stop offset="40%" stop-color="#0A84FF"/>
      <stop offset="100%" stop-color="#0051B3"/>
    </linearGradient>
    <linearGradient id="kit-sheen" x1="64" y1="0" x2="64" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- App tile -->
  <rect width="128" height="128" rx="32" fill="url(#kit-bg)"/>
  <rect width="128" height="128" rx="32" fill="url(#kit-sheen)"/>

  <!--
    Kit mark: rounded stem + chevron arms.
    Optical gap from stem keeps the form crisp at favicon sizes.
  -->
