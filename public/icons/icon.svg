      C96 51.6 94.7 53.8 92.6 54.9
      L70.2 66.8
      C64.8 69.6 58 65.8 58 59.6
      V58Z
    "/>
    <!-- Lower arm -->
    <path d="
      M58 70
      C58 73.2 59.9 75.8 62.8 77.3
      L86.4 89.8
      C90.8 92.1 96 88.9 96 83.9
      V78.8
      C96 76.4 94.7 74.2 92.6 73.1
